name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  lint-typecheck-build:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # No package-lock.json is committed in this repo, so `npm ci` isn't
      # available here — plain `npm install` is the working equivalent.
      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build
